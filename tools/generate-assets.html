<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #1a1a2e; color: #eee; font-family: 'Apple SD Gothic Neo', sans-serif; padding: 24px; }
  h1 { font-size: 22px; margin-bottom: 6px; color: #ffd700; }
  p  { font-size: 13px; color: #aaa; margin-bottom: 28px; }
  .grid { display: flex; flex-wrap: wrap; gap: 28px; }
  .card {
    background: #16213e; border: 1px solid #0f3460; border-radius: 12px;
    padding: 16px; display: flex; flex-direction: column; align-items: center; gap: 12px;
  }
  .card h2 { font-size: 13px; color: #7ec8e3; text-align: center; }
  canvas { image-rendering: pixelated; max-width: 300px; max-height: 240px; width: auto; height: auto; border-radius: 6px; }
  button {
    background: #e94560; color: #fff; border: none; border-radius: 6px;
    padding: 8px 18px; font-size: 13px; cursor: pointer; font-weight: 700;
  }

  #downloadAll {
    display: block; margin: 0 auto 32px; background: #ffd700; color: #1a1a2e;
    border: none; border-radius: 8px; padding: 14px 32px; font-size: 16px;
    font-weight: 900; cursor: pointer; letter-spacing: 0.5px;
  }
  #downloadAll:hover { background: #f0c800; }
  .size-label { font-size: 11px; color: #666; }

</head>
<body>
<h1>🍎 우다다! 사과는 다 내꺼! — 앱스토어 에셋 생성기</h1>
<p>아래 이미지를 확인 후 개별 다운로드하거나 [전체 다운로드] 버튼을 클릭하세요.</p>
<button id="downloadAll">⬇ 전체 다운로드 (ZIP 없이 순차 저장)</button>
<div class="grid" id="grid"></div>

<script>
// ─────────────────────────────────────────────────────────────────────────────
// 색상 팔레트 (게임과 동일)
const C = {
  sky1:'#87ceeb', sky2:'#b0e0ff',
  grass1:'#5a9e3a', grass2:'#4a8a2c', grass3:'#6db84a',
  dirt1:'#a0704a', dirt2:'#8a5c38',
  leaf1:'#6abf4b', leaf2:'#4e9e2d', leaf3:'#3a7f1a',
  trunk:'#7a4a2a',
  black:'#1a1a1a', white:'#f8f8f8',
  playerColor:'#f9a8d4',
  ai1Color:'#a5b4fc',
  ai2Color:'#fde68a',
  appleRed:'#e63030', appleGreen:'#3a9e2a', appleYellow:'#f0d030',
  gold:'#ffd700',
  titleBg:'#1a1a2e',
  btnGreen:'#4caf50', btnBlue:'#2196f3', btnRed:'#e53935',
}

// ─────────────────────────────────────────────────────────────────────────────
// 공통 드로잉 유틸
function fillPx(ctx, x, y, w, h, color) {
  ctx.fillStyle = color
  ctx.fillRect(x, y, w, h)
}

// 픽셀 하늘 + 잔디 배경
function drawBackground(ctx, W, H, darkMode = false) {
  if (darkMode) {
    ctx.fillStyle = '#0d1117'; ctx.fillRect(0, 0, W, H)
    ctx.fillStyle = '#161b22'; ctx.fillRect(0, H * 0.62, W, H * 0.38)
    ctx.fillStyle = '#21262d'; ctx.fillRect(0, H * 0.6, W, H * 0.04)
    return
  }
  // 하늘 그라디언트 (2단계)
  const g = ctx.createLinearGradient(0, 0, 0, H * 0.62)
  g.addColorStop(0, '#5ba8e0')
  g.addColorStop(1, '#a8d8f0')
  ctx.fillStyle = g; ctx.fillRect(0, 0, W, H * 0.62)

  // 구름
  function cloud(cx, cy, s) {
    const p = Math.max(2, Math.round(s))
    ;[[0,0,4,2],[2,-1,3,2],[-2,-1,3,2],[4,0,3,2],[1,1,5,1]].forEach(([dx,dy,bw,bh]) => {
      fillPx(ctx, Math.round(cx+dx*p), Math.round(cy+dy*p), bw*p, bh*p, '#ffffff')
    })
  }
  cloud(W*0.13, H*0.1, W/80); cloud(W*0.55, H*0.08, W/70); cloud(W*0.8, H*0.14, W/90)

  // 잔디
  const gY = Math.round(H * 0.60)
  const p2 = Math.max(2, Math.round(W/100))
  ctx.fillStyle = C.grass1; ctx.fillRect(0, gY, W, H - gY)
  ctx.fillStyle = C.grass2; ctx.fillRect(0, gY + p2*5, W, H - gY - p2*5)
  ctx.fillStyle = C.dirt1;  ctx.fillRect(0, gY + p2*8, W, H - gY - p2*8)
  // 잔디 톱니
  ctx.fillStyle = C.grass3
  for (let i = 0; i * p2*4 < W; i++) {
    const gx = i * p2*4
    fillPx(ctx, gx, gY+p2*3, p2*2, p2, C.grass3)
    fillPx(ctx, gx+p2*3, gY+p2*2, p2, p2*2, C.grass3)
  }
}

// 픽셀 나무
function drawTree(ctx, cx, groundY, s) {
  const p = Math.max(2, Math.round(s))
  const rows = [2,4,6,7,7,6,4,2]
  const treeH = rows.length * p
  const ty = groundY - treeH - p*3

  // 줄기
  const tw = p*2, tx = Math.round(cx - p)
  fillPx(ctx, tx, groundY - p*3, tw, p*3, C.trunk)

  // 외곽선
  ctx.fillStyle = C.black
  rows.forEach((w, ry) => {
    ctx.fillRect(Math.round(cx-(w/2+1)*p), ty+ry*p, (w+2)*p, p)
  })
  // 중간 초록
  ctx.fillStyle = C.leaf2
  rows.forEach((w, ry) => { ctx.fillRect(Math.round(cx-w/2*p), ty+ry*p, w*p, p) })
  // 하이라이트
  ctx.fillStyle = C.leaf1
  rows.slice(0,5).forEach((w, ry) => {
    ctx.fillRect(Math.round(cx-w/2*p), ty+ry*p, Math.ceil(w*0.55)*p, p)
  })
  // 그림자
  ctx.fillStyle = C.leaf3
  rows.slice(4).forEach((w, ry) => {
    ctx.fillRect(Math.round(cx+w*0.25*p), ty+(ry+4)*p, Math.ceil(w*0.35)*p, p)
  })
}

// 픽셀 사과
function drawApple(ctx, cx, cy, r) {
  const p = Math.max(2, Math.round(r/3.5))
  const rows = [[2,0],[4,0],[5,0],[5,1],[4,1],[2,1],[1,2]]
  rows.forEach(([w, yo]) => {
    fillPx(ctx, Math.round(cx-w/2*p), Math.round(cy+yo*p-3*p), w*p, p, C.appleRed)
  })
  fillPx(ctx, Math.round(cx), Math.round(cy-4*p), p, p*2, C.appleGreen)
  fillPx(ctx, Math.round(cx-p), Math.round(cy-2*p), p, p, '#ffffff55')
}

// ─────────────────────────────────────────────────────────────────────────────
// 카피바라 (플레이어)
function drawCapybara(ctx, cx, cy, r, darkMode = false) {
  const p = Math.max(2, Math.round(r/4.5))
  const color = darkMode ? '#d4a0b4' : C.playerColor
  // 몸
  ;[[-4,1,8,5],[-5,0,10,5],[-5,-1,10,4],[-4,-2,8,3]].forEach(([dx,dy,bw,bh])=>
    fillPx(ctx, Math.round(cx+dx*p), Math.round(cy+dy*p), bw*p, bh*p, color))
  // 귀
  fillPx(ctx, Math.round(cx-5*p), Math.round(cy-3*p), p*2, p*2, color)
  fillPx(ctx, Math.round(cx+3*p), Math.round(cy-3*p), p*2, p*2, color)
  // 머리
  ;[[-3,-4,6,3],[-4,-3,8,3]].forEach(([dx,dy,bw,bh])=>
    fillPx(ctx, Math.round(cx+dx*p), Math.round(cy+dy*p), bw*p, bh*p, color))
  // 코
  fillPx(ctx, Math.round(cx-2*p), Math.round(cy), p*4, p*2, darkMode?'#b08090':'#e8907a')
  // 눈
  fillPx(ctx, Math.round(cx-2*p), Math.round(cy-2*p), p, p, '#2a1a10')
  fillPx(ctx, Math.round(cx+p),   Math.round(cy-2*p), p, p, '#2a1a10')
}

// 판다 (AI1)
function drawPanda(ctx, cx, cy, r) {
  const p = Math.max(2, Math.round(r/4.5))
  ;[[-4,1,8,5],[-5,0,10,5],[-5,-1,10,4],[-4,-2,8,3]].forEach(([dx,dy,bw,bh])=>
    fillPx(ctx,Math.round(cx+dx*p),Math.round(cy+dy*p),bw*p,bh*p,'#f0f0f0'))
  ;[[-4,-4,8,4],[-5,-3,10,3]].forEach(([dx,dy,bw,bh])=>
    fillPx(ctx,Math.round(cx+dx*p),Math.round(cy+dy*p),bw*p,bh*p,'#f0f0f0'))
  fillPx(ctx,Math.round(cx-6*p),Math.round(cy-5*p),p*3,p*3,'#222')
  fillPx(ctx,Math.round(cx+3*p),Math.round(cy-5*p),p*3,p*3,'#222')
  fillPx(ctx,Math.round(cx-3*p),Math.round(cy-3*p),p*2,p*2,'#222')
  fillPx(ctx,Math.round(cx+p),  Math.round(cy-3*p),p*2,p*2,'#222')
  fillPx(ctx,Math.round(cx-2*p),Math.round(cy-1*p),p*4,p*2,'#ddd')
  fillPx(ctx,Math.round(cx-p),  Math.round(cy),    p*2,p,'#555')
}

// 골댕이 (AI2)
function drawGolden(ctx, cx, cy, r) {
  const p = Math.max(2, Math.round(r/4.5))
  const gol = '#f0c050'
  ;[[-4,1,8,5],[-5,0,10,5],[-5,-1,10,4],[-4,-2,8,3]].forEach(([dx,dy,bw,bh])=>
    fillPx(ctx,Math.round(cx+dx*p),Math.round(cy+dy*p),bw*p,bh*p,gol))
  ;[[-4,-4,8,3],[-5,-3,10,3]].forEach(([dx,dy,bw,bh])=>
    fillPx(ctx,Math.round(cx+dx*p),Math.round(cy+dy*p),bw*p,bh*p,gol))
  fillPx(ctx,Math.round(cx-5*p),Math.round(cy-5*p),p*2,p*3,'#d4a030')
  fillPx(ctx,Math.round(cx+3*p),Math.round(cy-5*p),p*2,p*3,'#d4a030')
  fillPx(ctx,Math.round(cx-2*p),Math.round(cy-2*p),p,p,'#1a1a1a')
  fillPx(ctx,Math.round(cx+p),  Math.round(cy-2*p),p,p,'#1a1a1a')
  fillPx(ctx,Math.round(cx-p),  Math.round(cy),    p*2,p,'#d47030')
  fillPx(ctx,Math.round(cx-p),  Math.round(cy+p),  p*2,p,'#e88050')
}

// ─────────────────────────────────────────────────────────────────────────────
// 타이틀 텍스트 (2줄)
function drawTitle(ctx, cx, cy, fontSize, darkMode = false) {
  ctx.textAlign = 'center'
  ctx.textBaseline = 'middle'
  ctx.fillStyle = C.gold
  ctx.font = `900 ${fontSize}px 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif`
  // 그림자
  ctx.shadowColor = '#00000066'; ctx.shadowBlur = 4; ctx.shadowOffsetY = 2
  ctx.fillText('우다다!', cx, cy - fontSize * 0.6)
  ctx.fillText('사과는 다 내꺼!', cx, cy + fontSize * 0.6)
  ctx.shadowBlur = 0; ctx.shadowOffsetY = 0
}

// 픽셀 베이스 영역
function drawBase(ctx, cx, cy, r, color, label) {
  const p = Math.max(2, Math.round(r/10))
  ctx.fillStyle = color + '88'
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.fill()
  ctx.strokeStyle = color; ctx.lineWidth = p*2; ctx.stroke()
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle'
  ctx.fillStyle = '#fff'; ctx.font = `700 ${p*4}px 'Apple SD Gothic Neo', sans-serif`
  ctx.fillText(label, cx, cy)
}

// ─────────────────────────────────────────────────────────────────────────────
// 이미지 정의
const ASSETS = [
  {
    id: 'logo', label: '앱 로고 (라이트)', filename: 'logo_600x600.png',
    w: 600, h: 600,
    draw(ctx, W, H) {
      // 배경
      const g = ctx.createLinearGradient(0, 0, W, H)
      g.addColorStop(0, '#2d6a4f'); g.addColorStop(1, '#1b4332')
      ctx.fillStyle = g; ctx.fillRect(0, 0, W, H)
      // 둥근 모서리 마스크
      roundRect(ctx, 0, 0, W, H, 80)
      ctx.clip()
      ctx.fillStyle = g; ctx.fillRect(0, 0, W, H)

      // 픽셀 나무들
      drawTree(ctx, W*0.12, H*0.72, W*0.04)
      drawTree(ctx, W*0.88, H*0.72, W*0.04)
      drawTree(ctx, W*0.25, H*0.70, W*0.035)
      drawTree(ctx, W*0.75, H*0.70, W*0.035)

      // 잔디
      ctx.fillStyle = '#3a7d44'; ctx.fillRect(0, H*0.70, W, H*0.30)
      ctx.fillStyle = '#2d6a4f'; ctx.fillRect(0, H*0.74, W, H*0.26)

      // 큰 카피바라 + 사과
      drawCapybara(ctx, W/2, H*0.52, W*0.18)
      drawApple(ctx, W/2 + W*0.14, H*0.44, W*0.09)
      drawApple(ctx, W/2 - W*0.14, H*0.44, W*0.09)
      drawApple(ctx, W/2, H*0.36, W*0.09)

      // 제목
      ctx.fillStyle = C.gold
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle'
      ctx.shadowColor = '#00000088'; ctx.shadowBlur = 6; ctx.shadowOffsetY = 3
      ctx.font = `900 ${W*0.095}px 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif`
      ctx.fillText('우다다!', W/2, H*0.155)
      ctx.font = `900 ${W*0.075}px 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif`
      ctx.fillText('사과는 다 내꺼!', W/2, H*0.255)
      ctx.shadowBlur = 0; ctx.shadowOffsetY = 0
    }
  },
  {
    id: 'logo_dark', label: '앱 로고 (다크)', filename: 'logo_dark_600x600.png',
    w: 600, h: 600,
    draw(ctx, W, H) {
      const g = ctx.createLinearGradient(0, 0, W, H)
      g.addColorStop(0, '#0d1b2a'); g.addColorStop(1, '#1b2838')
      ctx.fillStyle = g; ctx.fillRect(0, 0, W, H)
      roundRect(ctx, 0, 0, W, H, 80)
      ctx.clip()
      ctx.fillStyle = g; ctx.fillRect(0, 0, W, H)

      // 별
      for (let i = 0; i < 20; i++) {
        const sx = Math.random()*W, sy = Math.random()*H*0.55
        const sr = Math.random()*3+1
        ctx.fillStyle = '#ffffff' + Math.floor(Math.random()*128+64).toString(16).padStart(2,'0')
        ctx.beginPath(); ctx.arc(sx, sy, sr, 0, Math.PI*2); ctx.fill()
      }

      // 나무 (더 어두운 버전)
      drawTree(ctx, W*0.12, H*0.72, W*0.04)
      drawTree(ctx, W*0.88, H*0.72, W*0.04)

      // 잔디
      ctx.fillStyle = '#1a3a22'; ctx.fillRect(0, H*0.70, W, H*0.30)
      ctx.fillStyle = '#142e1a'; ctx.fillRect(0, H*0.74, W, H*0.26)

      drawCapybara(ctx, W/2, H*0.52, W*0.18, true)
      drawApple(ctx, W/2 + W*0.14, H*0.44, W*0.09)
      drawApple(ctx, W/2 - W*0.14, H*0.44, W*0.09)
      drawApple(ctx, W/2, H*0.36, W*0.09)

      ctx.fillStyle = '#ffd700'
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle'
      ctx.shadowColor = '#000000aa'; ctx.shadowBlur = 8; ctx.shadowOffsetY = 3
      ctx.font = `900 ${W*0.095}px 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif`
      ctx.fillText('우다다!', W/2, H*0.155)
      ctx.font = `900 ${W*0.075}px 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif`
      ctx.fillText('사과는 다 내꺼!', W/2, H*0.255)
      ctx.shadowBlur = 0; ctx.shadowOffsetY = 0
    }
  },
  {
    id: 'thumb_sq', label: '정방형 썸네일', filename: 'thumbnail_1000x1000.png',
    w: 1000, h: 1000,
    draw(ctx, W, H) {
      drawBackground(ctx, W, H)
      const gY = Math.round(H * 0.60)

      // 나무
      drawTree(ctx, W*0.1,  gY, W*0.05)
      drawTree(ctx, W*0.9,  gY, W*0.05)
      drawTree(ctx, W*0.22, gY, W*0.04)
      drawTree(ctx, W*0.78, gY, W*0.04)

      // 캐릭터 3인방
      drawPanda   (ctx, W*0.22, H*0.45, W*0.1)
      drawCapybara(ctx, W*0.5,  H*0.50, W*0.12)
      drawGolden  (ctx, W*0.78, H*0.45, W*0.1)

      // 사과들
      drawApple(ctx, W*0.5,  H*0.3,  W*0.07)
      drawApple(ctx, W*0.35, H*0.35, W*0.055)
      drawApple(ctx, W*0.65, H*0.33, W*0.055)

      // 제목 배너
      ctx.fillStyle = '#00000077'
      ctx.fillRect(0, H*0.66, W, H*0.22)
      ctx.fillStyle = C.gold
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle'
      ctx.shadowColor='#000'; ctx.shadowBlur=6; ctx.shadowOffsetY=2
      ctx.font = `900 ${W*0.085}px 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif`
      ctx.fillText('우다다!', W/2, H*0.72)
      ctx.font = `900 ${W*0.065}px 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif`
      ctx.fillText('사과는 다 내꺼!', W/2, H*0.80)
      ctx.shadowBlur=0; ctx.shadowOffsetY=0
    }
  },
  {
    id: 'thumb_wide', label: '가로형 썸네일', filename: 'thumbnail_1932x828.png',
    w: 1932, h: 828,
    draw(ctx, W, H) {
      drawBackground(ctx, W, H)
      const gY = Math.round(H * 0.60)

      // 나무 여러 그루
      for (const [tx, ts] of [[0.05,0.04],[0.15,0.035],[0.35,0.03],[0.65,0.03],[0.85,0.035],[0.95,0.04]]) {
        drawTree(ctx, W*tx, gY, W*ts)
      }

      // 베이스 3개
      drawBase(ctx, W*0.15, H*0.35, H*0.13, C.ai1Color, '팬더')
      drawBase(ctx, W*0.85, H*0.35, H*0.13, C.ai2Color, '골댕이')
      drawBase(ctx, W*0.5,  H*0.55, H*0.13, C.playerColor, '카피바라')

      // 캐릭터
      drawPanda   (ctx, W*0.15, H*0.28, H*0.12)
      drawGolden  (ctx, W*0.85, H*0.28, H*0.12)
      drawCapybara(ctx, W*0.5,  H*0.42, H*0.14)

      // 사과들
      ;[[0.4,0.25],[0.5,0.22],[0.6,0.25],[0.45,0.32],[0.55,0.30]].forEach(([rx,ry])=>
        drawApple(ctx, W*rx, H*ry, H*0.06))

      // 좌측 타이틀 박스
      ctx.fillStyle = '#00000088'
      roundRect2(ctx, W*0.27, H*0.05, W*0.46, H*0.38, H*0.04)
      ctx.fill()
      ctx.fillStyle = C.gold
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle'
      ctx.shadowColor='#000'; ctx.shadowBlur=8; ctx.shadowOffsetY=3
      ctx.font = `900 ${H*0.14}px 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif`
      ctx.fillText('우다다! 사과는 다 내꺼!', W*0.5, H*0.24)
      ctx.shadowBlur=0; ctx.shadowOffsetY=0
    }
  },
  {
    id: 'preview1', label: '미리보기 1: 타이틀', filename: 'preview_title_636x1048.png',
    w: 636, h: 1048,
    draw(ctx, W, H) {
      // 타이틀 화면 재현
      const g = ctx.createLinearGradient(0,0,0,H)
      g.addColorStop(0,'#1a3a22'); g.addColorStop(0.5,'#2d6a4f'); g.addColorStop(1,'#1b4332')
      ctx.fillStyle = g; ctx.fillRect(0,0,W,H)

      // 픽셀 잔디 배경
      drawBackground(ctx, W, H*0.65)
      const gY = Math.round(H*0.65*0.6)
      drawTree(ctx, W*0.12, gY, W*0.05)
      drawTree(ctx, W*0.88, gY, W*0.05)
      drawTree(ctx, W*0.3, gY, W*0.04)
      drawTree(ctx, W*0.7, gY, W*0.04)

      // 캐릭터 3인방
      drawPanda   (ctx, W*0.2,  H*0.3, W*0.1)
      drawCapybara(ctx, W*0.5,  H*0.32, W*0.12)
      drawGolden  (ctx, W*0.8,  H*0.3, W*0.1)

      // 제목 영역
      ctx.fillStyle = '#00000055'; ctx.fillRect(0, H*0.46, W, H*0.28)
      ctx.fillStyle = C.gold
      ctx.textAlign='center'; ctx.textBaseline='middle'
      ctx.shadowColor='#000'; ctx.shadowBlur=8; ctx.shadowOffsetY=3
      ctx.font = `900 ${W*0.13}px 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif`
      ctx.fillText('우다다!', W/2, H*0.54)

      // 조이스틱 영역 표시
      ctx.fillStyle='#00000044'; ctx.fillRect(0, H*0.72, W, H*0.28)
      ctx.fillStyle='#ffffff33'
      ctx.beginPath(); ctx.arc(W/2, H*0.86, W*0.14, 0, Math.PI*2); ctx.fill()
      ctx.strokeStyle='#ffffff55'; ctx.lineWidth=3; ctx.stroke()

  {
    id: 'preview3', label: '미리보기 3: 클리어', filename: 'preview_clear_636x1048.png',

    draw(ctx, W, H) {

    id: 'preview_wide', label: '미리보기 가로형', filename: 'preview_landscape_1504x741.png',

    }

// ─────────────────────────────────────────────────────────────────────────────
// 유틸: 둥근 사각형
function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath()
  ctx.moveTo(x+r, y)
  ctx.lineTo(x+w-r, y); ctx.arcTo(x+w,y,x+w,y+r,r)
  ctx.lineTo(x+w, y+h-r); ctx.arcTo(x+w,y+h,x+w-r,y+h,r)
  ctx.lineTo(x+r, y+h); ctx.arcTo(x,y+h,x,y+h-r,r)
  ctx.lineTo(x, y+r); ctx.arcTo(x,y,x+r,y,r)
  ctx.closePath()
}
function roundRect2(ctx, x, y, w, h, r) { roundRect(ctx,x,y,w,h,r) }

// ─────────────────────────────────────────────────────────────────────────────
// 카드 렌더링
const grid = document.getElementById('grid')

ASSETS.forEach(asset => {
  const canvas = document.createElement('canvas')
  canvas.width = asset.w; canvas.height = asset.h
  const ctx = canvas.getContext('2d')
  ctx.imageSmoothingEnabled = false
  asset.draw(ctx, asset.w, asset.h)

  const card = document.createElement('div')
  card.className = 'card'
  card.innerHTML = `
    <h2>${asset.label}</h2>
    <span class="size-label">${asset.w} × ${asset.h} px</span>
  `
  card.appendChild(canvas)
  const btn = document.createElement('button')
  btn.textContent = '⬇ 다운로드'
  btn.onclick = () => downloadCanvas(canvas, asset.filename)
  card.appendChild(btn)
  grid.appendChild(card)
})

// 전체 다운로드 (순차)
document.getElementById('downloadAll').onclick = async () => {
  for (const asset of ASSETS) {
    const canvas = document.querySelector(`canvas`)
    // 해당 asset의 canvas 찾기
    const cards = document.querySelectorAll('.card')
    for (const card of cards) {
      const h2 = card.querySelector('h2')
      if (h2 && h2.textContent === asset.label) {
        const c = card.querySelector('canvas')
        downloadCanvas(c, asset.filename)
        await new Promise(r => setTimeout(r, 400))
      }
    }
  }
}

function downloadCanvas(canvas, filename) {
  const a = document.createElement('a')
  a.href = canvas.toDataURL('image/png')
  a.download = filename
  a.click()
}
